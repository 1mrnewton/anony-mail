services:
  app:
    # Prebuilt multi-arch image published to GitHub Container Registry. Pull it
    # with `docker compose pull`; no local Rust build required. Override the tag
    # with e.g. `ANONY_MAIL_TAG=0.1.0 docker compose up -d`.
    # To build from source instead, run `make docker-build` (see Makefile).
    image: ghcr.io/1mrnewton/anony-mail:${ANONY_MAIL_TAG:-latest}
    environment:
      # Each value reads from the host environment (or a .env file next to this
      # compose file), falling back to the default after `:-` when unset.
      #
      # Default backend: SQLite, stored on the named volume mounted at /data so
      # messages survive container restarts and redeploys. To use PostgreSQL,
      # start the optional service below (`docker compose --profile postgres up`)
      # and set DATABASE_URL=postgres://anonymail:anonymail@postgres:5432/anonymail
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/anony-mail.db}
      # Change these to your real domains (MX must point at this host).
      DOMAINS: ${DOMAINS:-example.com}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME:-mail.example.com}
      DEFAULT_TTL_SECONDS: ${DEFAULT_TTL_SECONDS:-3600}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      RUST_LOG: ${RUST_LOG:-info,anony_mail=debug}
    volumes:
      - maildata:/data
    ports:
      # Left side is the host port. Inbound SMTP must be reachable on 25 in
      # production; use e.g. "2525:25" locally if host port 25 is taken.
      - "25:25"
      - "8080:8080"

  # Optional PostgreSQL backend. Only started when the `postgres` profile is
  # active: `docker compose --profile postgres up`. Remember to also switch the
  # app's DATABASE_URL to the postgres:// line above.
  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: anonymail
      POSTGRES_PASSWORD: anonymail
      POSTGRES_DB: anonymail
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anonymail -d anonymail"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Exposed on the host for inspection/debugging; not required by the app.
    ports:
      - "5432:5432"

volumes:
  maildata:
  pgdata:
