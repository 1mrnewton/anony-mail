services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tempmail
      POSTGRES_PASSWORD: tempmail
      POSTGRES_DB: tempmail
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempmail -d tempmail"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Exposed on the host for inspection/debugging; not required by the app.
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tempmail:tempmail@postgres:5432/tempmail
      # Change these to your real domains (MX must point at this host).
      DOMAINS: example.com
      SMTP_HOSTNAME: mail.example.com
      DEFAULT_TTL_SECONDS: "3600"
      CORS_ALLOWED_ORIGINS: "*"
      RUST_LOG: "info,tempmail_backend=debug"
    ports:
      # Left side is the host port. Inbound SMTP must be reachable on 25 in
      # production; use e.g. "2525:25" locally if host port 25 is taken.
      - "25:25"
      - "8080:8080"

volumes:
  pgdata:
